services:
  - type: web
    name: mi-flask-scraper
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt && python -m playwright install --with-deps chromium
    startCommand: |
      gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: TZ
        value: UTC
      - key: RENDER
        value: "1"
    healthCheckPath: /healthz
